# Render deployment configuration.
# When you connect this repo to Render, it will read this file and set up
# the web service automatically. You still have to set the two secret
# env vars (ANTHROPIC_API_KEY and HF_TOKEN) manually in the dashboard.

services:
  - type: web
    name: storybased-game-maker
    runtime: python
    plan: free
    # Pre-cache the rembg U2Net model during build so the first user request
    # doesn't have to wait for a 180 MB download.
    buildCommand: |
      pip install -r requirements.txt
      python -c "from rembg import new_session; new_session('u2net'); print('U2Net model pre-cached')"
    startCommand: python server-side/web_server_v2.py
    envVars:
      # API keys must be set manually in the Render dashboard for security.
      # The two below will appear with empty values — go to your service →
      # Environment → set their real values from your local .env.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      # Render sets $PORT automatically; web_server_v2.py reads it.
